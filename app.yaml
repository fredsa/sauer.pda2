# https://cloud.google.com/appengine/docs/standard/reference/app-yaml?tab=go
runtime: go123

# https://cloud.google.com/appengine/docs/standard/reference/app-yaml?tab=go#runtime_and_app_elements
app_engine_apis: on

# https://cloud.google.com/appengine/docs/standard#instance_classes
instance_class: B1

# https://cloud.google.com/appengine/docs/standard/reference/app-yaml.md?tab=go#scaling_elements
basic_scaling:
  max_instances: 1
  idle_timeout: 5m

# https://docs.cloud.google.com/appengine/docs/standard/services/mail/bounce?tab=go#top
inbound_services:
    - mail_bounce

handlers:
# https://docs.cloud.google.com/appengine/docs/standard/services/mail/bounce?tab=go#top
- url: /_ah/bounce
  script: _go_app
  login: admin

- url: .*
  script: auto
  login: admin
  secure: always
